upstream app_upstream {
  server app:8000;
}

map $http_user_agent $ua_allowed {
  default 0;
  ~^FBps(\b|/|$) 1;
}

server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  # 1) 403 baseline only on canonical /admin/
  location /admin/ {
    return 403;
  }

  # 2) 401 baseline only on canonical /private/ (EXACT match)
  location = /private/ {
    auth_basic "Restricted";
    auth_basic_user_file /etc/nginx/.htpasswd;

    proxy_pass http://app_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # 3) Block internal prefix, but mistakenly allow *.json everywhere
  location /static/internal {
    return 403;
  }

  location ~* \.json$ {
    proxy_pass http://app_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # 4) X-Forwarded-For gating on /local
  location /local {
    if ($http_x_forwarded_for !~ "^127\.0\.0\.1(,|$)") {
      return 403;
    }

    proxy_pass http://app_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # 5) Trim Inconsistencies
  location = /trim {
    return 403;
  }

  location = /trim/ {
    return 403;
  }

  # 6) API version downgrade
  location /api/v2/ {
    return 403;
  }

  # 7) Case mismatch
  location /services/myservice {
    return 403;
  }

  # 8) User-agent allowlist
  location /user_agent {
    if ($ua_allowed = 0) { 
      return 403; 
    }

    proxy_pass http://app_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
  
  # Optional debug endpoint
  location = /_headers {
    default_type text/plain;
    return 200 "$request\nHost=$host\nRemote Address=$remote_addr\nX-Forwarded-For=$http_x_forwarded_for\nX-Real-IP=$http_x_real_ip\n";
  }

  # Default proxy pass-through (this is what “creates” the /admin bypass naturally)
  location / {
    proxy_pass http://app_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
